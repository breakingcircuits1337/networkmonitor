server {
    listen 80;

    # Docker's internal DNS — lets nginx start even if upstreams aren't up yet
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Serve the React SPA
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    # Geo-enriched SSE stream (geoip_enricher)
    location /events {
        set $upstream_geo http://geoip_enricher:5000;
        proxy_pass $upstream_geo/events;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_cache off;
        add_header Cache-Control no-cache;
        add_header X-Accel-Buffering no;
    }

    # Sarah API — chat, summary, triage, status
    location /api/ {
        set $upstream_api http://sarah_api:5000;
        proxy_pass $upstream_api$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 150s;
    }

    # Sarah API health/status
    location /health {
        set $upstream_api http://sarah_api:5000;
        proxy_pass $upstream_api/health;
        proxy_set_header Host $host;
    }

    # AI Analyst — stats, recent, summary, roles
    location /analyst/ {
        set $upstream_analyst http://ai_analyst:5001;
        proxy_pass $upstream_analyst/;
        proxy_set_header Host $host;
        proxy_read_timeout 90s;
    }

    # AI Analyst roles shortcut — /analyst/api/roles also works but this is cleaner for UI
    location /api/roles {
        set $upstream_analyst http://ai_analyst:5001;
        proxy_pass $upstream_analyst/api/roles;
        proxy_set_header Host $host;
        proxy_read_timeout 30s;
    }

    # Packet Launcher
    location /launch {
        set $upstream_launcher http://packet_launcher:7000;
        proxy_pass $upstream_launcher/launch;
        proxy_set_header Host $host;
    }

    # ── New services added in v2 ──────────────────────────────────────────

    # Settings API — encrypted key storage (all tabs, POST and GET)
    location /api/settings {
        set $upstream_settings http://settings_api:5002;
        proxy_pass $upstream_settings/api/settings;
        proxy_set_header Host $host;
        proxy_read_timeout 30s;
    }

    # Threat Intelligence — IOC feeds, intel-chat streaming, rules
    location /api/ioc/ {
        set $upstream_intel http://threat_intel:5003;
        proxy_pass $upstream_intel/api/ioc/;
        proxy_set_header Host $host;
        proxy_read_timeout 120s;
    }

    location /api/intel-chat {
        set $upstream_intel http://threat_intel:5003;
        proxy_pass $upstream_intel/api/intel-chat;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 120s;
        add_header X-Accel-Buffering no;
    }

    # Credential Monitor — status, check-password, refresh
    location /api/credentials/ {
        set $upstream_cred http://credential_monitor:5004;
        proxy_pass $upstream_cred/api/credentials/;
        proxy_set_header Host $host;
        proxy_read_timeout 60s;
    }

    # DNS Monitor — feed, DGA hits, manual trace
    location /api/dns/ {
        set $upstream_dns http://dns_monitor:5005;
        proxy_pass $upstream_dns/api/dns/;
        proxy_set_header Host $host;
        proxy_read_timeout 30s;
    }
}
