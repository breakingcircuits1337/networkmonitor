services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://kafka:9092,HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    ports:
      - "9092:9092"
      - "29092:29092"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "kafka:9092"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  schema-registry:
    image: confluentinc/cp-schema-registry:7.4.0
    container_name: schema-registry
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:9092
      SCHEMA_REGISTRY_LISTENERS: "http://0.0.0.0:8081"
    ports:
      - "8081:8081"

  neo4j:
    image: neo4j:5-enterprise
    container_name: neo4j
    environment:
      NEO4J_AUTH: neo4j/neo4jpassword
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 2G
      NEO4J_server_memory_pagecache_size: 1G
    ports:
      - "0.0.0.0:7474:7474"
      - "0.0.0.0:7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p neo4jpassword 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11435:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_HOST: "0.0.0.0"

  asset_discovery:
    build:
      context: .
      dockerfile: ./sensors/asset_discovery/Dockerfile
    container_name: asset_discovery
    environment:
      NETWORK_RANGE: "192.168.1.0/24"
      SCAN_INTERVAL_SECONDS: 300
      KAFKA_BOOTSTRAP: "kafka:9092"
      KAFKA_TOPIC: "asset.discovery"
    depends_on:
      kafka:
        condition: service_healthy

  topology_updater:
    build:
      context: .
      dockerfile: ./services/topology_updater/Dockerfile
    container_name: topology_updater
    environment:
      KAFKA_BOOTSTRAP: "kafka:9092"
      KAFKA_TOPIC: "asset.discovery"
      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_USER: "neo4j"
      NEO4J_PASSWORD: "neo4jpassword"
    depends_on:
      kafka:
        condition: service_healthy
      neo4j:
        condition: service_healthy

  traffic_analysis:
    build:
      context: .
      dockerfile: ./sensors/traffic_analysis/Dockerfile
    container_name: traffic_analysis
    environment:
      INTERFACE: "eth0"
      FLOW_WINDOW_SECONDS: 30
      KAFKA_BOOTSTRAP: "localhost:29092"
      KAFKA_TOPIC: "netflow"
    depends_on:
      kafka:
        condition: service_healthy
    network_mode: "host"

  encrypted_traffic_analysis:
    build:
      context: .
      dockerfile: ./sensors/encrypted_traffic_analysis/Dockerfile
    container_name: encrypted_traffic_analysis
    environment:
      INTERFACE: "eth0"
      KAFKA_BOOTSTRAP: "localhost:29092"
      KAFKA_TOPIC: "tls.meta"
    depends_on:
      kafka:
        condition: service_healthy
    network_mode: "host"

  passive_fingerprint:
    build:
      context: .
      dockerfile: ./sensors/passive_fingerprint/Dockerfile
    container_name: passive_fingerprint
    environment:
      INTERFACE: "eth0"
      KAFKA_BOOTSTRAP: "localhost:29092"
      KAFKA_TOPIC: "fingerprint.events"
    depends_on:
      kafka:
        condition: service_healthy
    network_mode: "host"
    cap_add:
      - NET_RAW
      - NET_ADMIN

  suricata:
    build:
      context: .
      dockerfile: ./sensors/suricata_custom/Dockerfile
    container_name: suricata
    network_mode: "host"
    command: ["-c", "/etc/suricata/suricata.yaml", "-i", "eth0", "--init-errors-fatal"]
    environment:
      ET_PRO_API_KEY: ${ET_PRO_API_KEY:-}
    volumes:
      - suricata_logs:/var/log/suricata

  ids_alert_forwarder:
    build:
      context: .
      dockerfile: ./sensors/ids_alert_forwarder/Dockerfile
    container_name: ids_alert_forwarder
    environment:
      EVE_FILE: "/var/log/suricata/eve.json"
      KAFKA_BOOTSTRAP: "kafka:9092"
      KAFKA_TOPIC: "security.alerts"
    volumes:
      - suricata_logs:/var/log/suricata:ro
    depends_on:
      kafka:
        condition: service_healthy
      suricata:
        condition: service_started

  ksqldb-server:
    image: confluentinc/ksqldb-server:0.29.0
    container_name: ksqldb-server
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_started
    environment:
      KSQL_CONFIG_DIR: "/etc/ksqldb"
      KSQL_BOOTSTRAP_SERVERS: "kafka:9092"
      KSQL_LISTENERS: "http://0.0.0.0:8088"
      KSQL_KSQL_SCHEMA_REGISTRY_URL: "http://schema-registry:8081"
    ports:
      - "8088:8088"

  ksqldb-cli:
    image: confluentinc/ksqldb-cli:0.29.0
    container_name: ksqldb-cli
    depends_on:
      ksqldb-server:
        condition: service_started
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Waiting for ksqlDB server..." && \
        while ! nc -z ksqldb-server 8088; do sleep 1; done; \
        echo "Waiting for Kafka topics..." && \
        sleep 5; \
        echo "Bootstrapping ksqlDB..." && \
        ksql http://ksqldb-server:8088 < /init.sql && \
        tail -f /dev/null
    volumes:
      - ./stream_aggregation/init.sql:/init.sql:ro

  alert_sink_neo4j:
    build:
      context: .
      dockerfile: ./services/alert_sink_neo4j/Dockerfile
    container_name: alert_sink_neo4j
    environment:
      KAFKA_BOOTSTRAP: "kafka:9092"
      KAFKA_TOPIC: "alert.correlated"
      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_USER: "neo4j"
      NEO4J_PASSWORD: "neo4jpassword"
    depends_on:
      kafka:
        condition: service_healthy
      neo4j:
        condition: service_healthy

  zeek:
    image: blacktop/zeek:latest
    container_name: zeek
    network_mode: "host"
    command: ["-i", "eth0", "-C", "LogAscii::use_json=T"]
    volumes:
      - zeek_logs:/pcap
    environment:
      ZEEK_LOG_DIR: "/pcap"

  dpi_event_forwarder:
    build:
      context: .
      dockerfile: ./sensors/dpi_event_forwarder/Dockerfile
    container_name: dpi_event_forwarder
    volumes:
      - zeek_logs:/pcap:ro
    environment:
      LOG_DIR: "/pcap"
      KAFKA_BOOTSTRAP: "kafka:9092"
      KAFKA_TOPIC: "dpi.events"
    depends_on:
      kafka:
        condition: service_healthy
      zeek:
        condition: service_started

  geoip_enricher:
    build:
      context: .
      dockerfile: ./services/geoip_enricher/Dockerfile
    container_name: geoip_enricher
    environment:
      KAFKA_BOOTSTRAP: "kafka:9092"
      IN_TOPIC: "netflow"
      OUT_TOPIC: "geo.events"
      EXTRA_TOPICS: "security.alerts,dpi.events,voip.events,ai.analysis,blocklist.actions,raw.flows,fingerprint.events"
      HTTP_PORT: 5000
      HOME_LAT: "38.9"
      HOME_LON: "-77.0"
    volumes:
      - ./GeoLite2-City.mmdb:/geoip/GeoLite2-City.mmdb:ro
    depends_on:
      kafka:
        condition: service_healthy

  ui:
    build:
      context: .
      dockerfile: ./ui/Dockerfile
    container_name: ui
    ports:
      - "0.0.0.0:8080:80"
    depends_on:
      geoip_enricher:
        condition: service_started

  soar_blocker:
    build:
      context: .
      dockerfile: ./services/soar_blocker/Dockerfile
    container_name: soar_blocker
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      KAFKA_BOOTSTRAP: "kafka:9092"
      IDS_TOPIC: "security.alerts"
      UEBA_TOPIC: "ueba.alerts"
      SEVERITY_THRESHOLD: 2
      ANOMALY_THRESHOLD: 0.5
      BLOCKLIST_CMD: "echo 'iptables -A INPUT -s {ip} -j DROP'"
      OLLAMA_URL: "http://host.docker.internal:11434"
      OLLAMA_MODEL: "aratan/Ministral-3-14B-Reasoning-2512:latest"
      LLM_BLOCK_ENABLED: "false"
      LLM_BLOCK_CONFIDENCE: "0.8"
      LLM_FALLBACK_BLOCK: "true"
      CHECK_INTERVAL: "60"
    depends_on:
      kafka:
        condition: service_healthy
      ollama:
        condition: service_started

  packet_launcher:
    build:
      context: .
      dockerfile: ./services/packet_launcher/Dockerfile
    container_name: packet_launcher
    network_mode: "host"
    environment:
      ENABLE_PACKET_LAUNCHER: "${ENABLE_PACKET_LAUNCHER:-false}"
      LAUNCH_TOKEN: "${LAUNCH_TOKEN:-}"
      KAFKA_BOOTSTRAP: "localhost:29092"
    cap_add:
      - NET_RAW
      - NET_ADMIN
    ports:
      - "7000:7000"
    depends_on:
      kafka:
        condition: service_healthy

  ai_analyst:
    build:
      context: .
      dockerfile: ./services/ai_analyst/Dockerfile
    container_name: ai_analyst
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "0.0.0.0:5001:5001"
    environment:
      KAFKA_BOOTSTRAP: "kafka:9092"
      OLLAMA_URL: "http://host.docker.internal:11434"
      OLLAMA_MODEL: "aratan/Ministral-3-14B-Reasoning-2512:latest"
      SECONDARY_MODEL: "cybersecserver/matrix-ai:latest"
      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_USER: "neo4j"
      NEO4J_PASSWORD: "neo4jpassword"
      ANALYSIS_TOPICS: "alert.correlated,security.alerts,dpi.events,voip.events"
      BATCH_WINDOW_SECONDS: "30"
      IMMEDIATE_SEVERITY: "2"
      SUMMARY_INTERVAL_MINUTES: "60"
    depends_on:
      kafka:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      ollama:
        condition: service_started

  voip_analysis:
    build:
      context: .
      dockerfile: ./sensors/voip_analysis/Dockerfile
    container_name: voip_analysis
    environment:
      INTERFACE: "eth0"
      KAFKA_BOOTSTRAP: "localhost:29092"
      KAFKA_TOPIC: "voip.events"
    network_mode: "host"
    depends_on:
      kafka:
        condition: service_healthy

  tshark_capture:
    build:
      context: .
      dockerfile: ./sensors/tshark_capture/Dockerfile
    container_name: tshark_capture
    environment:
      INTERFACE: "eth0"
      CAPTURE_DIR: "/captures"
      KAFKA_BOOTSTRAP: "localhost:29092"
      KAFKA_TOPIC: "voip.packets"
      ROTATION_SECONDS: "30"
      RAW_FLOWS_TOPIC: "raw.flows"
      MAX_FLOWS_PER_ROTATION: "200"
    volumes:
      - voip_captures:/captures
    network_mode: "host"
    depends_on:
      kafka:
        condition: service_healthy

  sarah_api:
    build:
      context: .
      dockerfile: ./services/sarah_api/Dockerfile
    container_name: sarah_api
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "0.0.0.0:5000:5000"
    environment:
      KAFKA_BOOTSTRAP: "kafka:9092"
      OLLAMA_URL: "http://host.docker.internal:11434"
      OLLAMA_MODEL: "aratan/Ministral-3-14B-Reasoning-2512:latest"
      OLLAMA_FALLBACK: "cybersecserver/matrix-ai:latest"
      AI_ANALYST_URL: "http://ai_analyst:5001"
    depends_on:
      kafka:
        condition: service_healthy
      ollama:
        condition: service_started
      ai_analyst:
        condition: service_started

volumes:
  neo4j_data:
  suricata_logs:
  zeek_logs:
  voip_captures:
  ollama_data:
